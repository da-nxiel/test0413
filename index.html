<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIMEN | Visual Essay Book</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      background: #f2f0eb;
      color: #111;
      font-family: "Times New Roman", "Noto Serif KR", serif;
      overflow-x: hidden;
    }

    section{
      position: relative;
      width: 100%;
      min-height: 100vh;
      padding: 62px 76px 48px;
      background: #f2f0eb;
      overflow: hidden;
    }

    .grain{
      position: absolute;
      inset: 0;
      opacity: .08;
      pointer-events: none;
      background-image: radial-gradient(#111 0.7px, transparent 0.7px);
      background-size: 8px 8px;
      z-index: 1;
    }

    header{
      position: relative;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .logo{
      color: #111;
      text-decoration: none;
      font-size: 26px;
      line-height: .9;
      letter-spacing: 2px;
      font-weight: 400;
    }

    .logo span{
      display: block;
      margin-left: 38px;
    }

    nav ul{
      display: flex;
      gap: 38px;
      list-style: none;
    }

    nav a{
      color: #111;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
    }

    .hero{
      position: relative;
      z-index: 4;
      min-height: calc(100vh - 130px);
      display: grid;
      grid-template-columns: 1fr 430px;
      align-items: center;
      gap: 70px;
    }

    .left-area{
      position: relative;
      max-width: 760px;
    }

    .label{
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    h1{
      font-size: clamp(70px, 9vw, 142px);
      font-weight: 400;
      letter-spacing: -6px;
      line-height: .78;
    }

    h1 .break{
      display: block;
      margin-left: 140px;
    }

    .subtitle{
      margin-top: 38px;
      max-width: 470px;
      font-size: 17px;
      line-height: 1.9;
      word-break: keep-all;
    }

    .quote{
      position: absolute;
      left: 420px;
      bottom: -82px;
      font-size: 34px;
      line-height: 1.2;
      letter-spacing: -1px;
      color: rgba(17,17,17,.42);
      white-space: nowrap;
    }

    .book-btn{
      display: inline-block;
      margin-top: 38px;
      padding: 12px 24px;
      border: 1px solid #111;
      color: #111;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: .3s;
    }

    .book-btn:hover{
      background: #111;
      color: #f2f0eb;
    }

    .visual-area{
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 560px;
    }

    .stripe-card{
      position: absolute;
      width: 360px;
      height: 500px;
      background: repeating-linear-gradient(
        0deg,
        #111 0px,
        #111 5px,
        #f2f0eb 5px,
        #f2f0eb 10px
      );
      overflow: hidden;
      transform: rotate(-2deg);
      box-shadow: 0 28px 70px rgba(0,0,0,.22);
    }

    .stripe-card::after{
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 45% 46%, transparent 0 32%, rgba(17,17,17,.88) 33% 36%, transparent 37% 100%);
      mix-blend-mode: multiply;
      opacity: .7;
    }

    .mainImage{
      position: relative;
      width: 260px;
      height: 365px;
      object-fit: cover;
      filter: grayscale(100%) contrast(1.14);
      box-shadow: 0 26px 60px rgba(0,0,0,.26);
      z-index: 3;
      transition: .4s;
    }

    .vertical-title{
      position: absolute;
      right: -8px;
      top: 48px;
      writing-mode: vertical-rl;
      font-size: 42px;
      letter-spacing: 12px;
      color: #111;
      z-index: 4;
    }

    .chapter-number{
      position: absolute;
      right: -20px;
      bottom: 14px;
      font-size: 74px;
      font-style: italic;
      color: #111;
      z-index: 4;
    }

    .chapters{
      position: absolute;
      left: 76px;
      bottom: 44px;
      z-index: 5;
      display: flex;
      gap: 20px;
      list-style: none;
    }

    .chapters li{
      width: 150px;
      cursor: pointer;
      transition: .3s;
    }

    .chapters li:hover{
      transform: translateY(-8px);
    }

    .chapters img{
      width: 150px;
      height: 86px;
      object-fit: cover;
      filter: grayscale(100%) contrast(1.1);
      border: 1px solid rgba(17,17,17,.2);
    }

    .chapters p{
      margin-top: 9px;
      font-size: 12px;
      line-height: 1.35;
      letter-spacing: .6px;
    }

    .side-info{
      position: absolute;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      z-index: 5;
    }

    .page-mark{
      position: absolute;
      right: 76px;
      bottom: 46px;
      font-size: 13px;
      letter-spacing: 2px;
      z-index: 5;
    }

    @media(max-width: 960px){
      section{
        padding: 34px 26px 180px;
      }

      header{
        gap: 20px;
      }

      nav ul{
        gap: 18px;
      }

      nav a{
        font-size: 11px;
      }

      .hero{
        grid-template-columns: 1fr;
        gap: 40px;
        padding-top: 70px;
      }

      h1 .break{
        margin-left: 68px;
      }

      .quote{
        position: relative;
        left: 0;
        bottom: auto;
        margin-top: 38px;
        font-size: 26px;
        white-space: normal;
      }

      .visual-area{
        min-height: 440px;
      }

      .stripe-card{
        width: 290px;
        height: 400px;
      }

      .mainImage{
        width: 220px;
        height: 310px;
      }

      .chapters{
        left: 26px;
        right: 26px;
        bottom: 42px;
        overflow-x: auto;
      }

      .side-info{
        display: none;
      }
    }
  </style>
</head>
<body>
  <section>
    <div class="grain"></div>

    <header>
      <a href="#" class="logo">L I<span>MEN</span></a>
      <nav>
        <ul>
          <li><a href="#">Intro</a></li>
          <li><a href="#">Chapter</a></li>
          <li><a href="#">Archive</a></li>
          <li><a href="#">About</a></li>
        </ul>
      </nav>
    </header>

    <main class="hero">
      <div class="left-area">
        <div class="label">Visual Essay Book / A5 / 100 Pages</div>
        <h1>Unfinished<span class="break">Moments</span></h1>
        <p class="subtitle">
          경계 위에 머물며, 스스로 선택하는 과정에 대한 이야기.
          LIMEN은 문턱 위에 선 순간들을 이미지와 문장으로 기록한 비주얼 에세이 북입니다.
        </p>
        <a class="book-btn" href="#">Explore Book</a>
        
      </div>

      <div class="visual-area">
        <div class="stripe-card"></div>
        <img src="./imgs/limen1.jpg" alt="LIMEN visual" class="mainImage">
        <div class="vertical-title">LIMEN</div>
        <div class="chapter-number"></div>
      </div>
    </main>

    <ul class="chapters">
      <li onclick="changeChapter('./imgs/limen1.jpg', '10', 'We Exist in Unfinished Moments.')">
        <img src="./imgs/limen2.jpg" alt="Chapter 1">
        <p>01 바깥의 빛</p>
      </li>
      <li onclick="changeChapter('./imgs/limen2.jpg', '14', 'The Outside Was Always Getting Brighter.')">
        <img src="./imgs/limen3.jpg" alt="Chapter 2">
        <p>02 오지 않는 시간</p>
      </li>
      <li onclick="changeChapter('./imgs/limen3.jpg', '32', 'In the Hour That Never Came.')">
        <img src="./imgs/limen4.jpg" alt="Chapter 3">
        <p>03 닿지 않는 거리</p>
      </li>
    </ul>

    <div class="side-info">LIMEN / Editorial Web Experience</div>
    <div class="page-mark">01 — 03</div>
  </section>

  <script>
    function changeChapter(image, number, quote){
      document.querySelector('.mainImage').src = image;
      document.querySelector('.chapter-number').textContent = number;
      document.querySelector('.quote').textContent = quote;
    }
  </script>
</body>
</html>
